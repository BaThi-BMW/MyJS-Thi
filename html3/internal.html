<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal JavaScript</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #f59e0b; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Cách 2: Internal JavaScript</h2>
    <button id="btnInternal">Nhấn vào tôi</button>

    <script>
        document.getElementById('btnInternal').addEventListener('click', function() {
            alert('Xin chào từ Internal JavaScript!');
        });
    </script>
</body>
</html>
